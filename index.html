<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Send BTC</title>
<style>
body { font-family: Arial; background:#0d0d0d; color:#eee; text-align:center; padding:40px; }
.box { background:#1a1a1a; padding:20px; border-radius:8px; display:inline-block; width:300px; }
input { width:90%; padding:10px; margin-top:10px; border-radius:4px; border:none; }
button {
  margin-top:15px; padding:10px 20px;
  background:#ff9900; border:none; color:black;
  font-weight:bold; cursor:pointer; border-radius:4px;
}
button:hover { background:#ffaa22; }
</style>
</head>
<body>
<h1>Send Bitcoin</h1>
<p>Enter BTC address and amount. Then click SEND.</p>

<div class="box">
  <input id="addr" type="text" placeholder="BTC address (bc1...)" />
  <input id="amt" type="number" step="0.00000001" placeholder="Amount BTC" />
  <button onclick="sendBTC()">Send BTC</button>
  <p id="out" style="margin-top:15px; color:#ccc;"></p>
</div>

<script>
function sendBTC(){
  const a = document.getElementById('addr').value.trim();
  const amt = document.getElementById('amt').value.trim();

  if (!a || a.length < 10) {
    document.getElementById('out').innerText = "Enter a valid BTC address.";
    return;
  }

  if (!amt || parseFloat(amt) <= 0) {
    document.getElementById('out').innerText = "Enter a valid amount.";
    return;
  }

  const url = `bitcoin:${a}?amount=${amt}`;

  document.getElementById('out').innerHTML =
    `Opening wallet link:<br><code>${url}</code>`;

  // Open BIP21 link → wallet handles sending
  window.location.href = url;
}
</script>

</body>
</html>
